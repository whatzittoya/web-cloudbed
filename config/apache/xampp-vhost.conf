# XAMPP Apache vhost example for this Slim app.
# Copy this block into:
# C:/xampp/apache/conf/extra/httpd-vhosts.conf
#
# Also make sure these modules are enabled in httpd.conf:
# - mod_rewrite
# - vhosts include: Include conf/extra/httpd-vhosts.conf
#
# Then add this hosts entry on Windows:
# 127.0.0.1 quinos-cloudbeds.local

<VirtualHost *:80>
    ServerName quinos-cloudbeds.local
    DocumentRoot "C:/xampp/htdocs/web-cloudbed/public"

    <Directory "C:/xampp/htdocs/web-cloudbed/public">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    ErrorLog "logs/quinos-cloudbeds-error.log"
    CustomLog "logs/quinos-cloudbeds-access.log" combined
</VirtualHost>

